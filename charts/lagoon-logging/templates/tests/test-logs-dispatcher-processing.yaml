{{- if .Values.testFixtures.create }}
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    lagoon.sh/environment: dev
    lagoon.sh/environmentType: development
    lagoon.sh/project: test-logs-deleteme-fakeproject
  name: test-logs-deleteme-fakeproject-dev
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    lagoon.sh/environment: prod
    lagoon.sh/environmentType: production
    lagoon.sh/project: test-logs-deleteme-fakeproject
  name: test-logs-deleteme-fakeproject-prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lagoon-logging.logsDispatcher.fullname" . }}-test-processing-fluent-conf
  labels:
    {{- include "lagoon-logging.logsDispatcher.labels" . | nindent 4 }}
data:
  fluent.conf: |
    <system>
      workers 1
      # comment out this line to see warnings
      # it is set to error because fluentd is quite chatty
      log_level error
    </system>
    # container logs collected by the logging-operator
    <source>
      @type  forward
      @id    in_container
      tag    process.container
    </source>

    #
    # pre-processing for ingress controller logs
    #
    # the reason for having the two match blocks is because we have two checks
    # to distinguish ingress controller logs:
    # * controller pod labels identify the ingress implementation
    # * namespace identifies the controller installation
    # if either of those checks fails the message is tagged as a regular
    # container log.
    #
    # check app name first. if app name didn't match, set tag to container log.
    <match process.container>
      @type rewrite_tag_filter
      <rule>
        key     $.kubernetes.labels.app
        pattern ^nginx-ingress$
        tag     "process.app_nginx_ingress"
      </rule>
      <rule>
        key     $['kubernetes']['labels']['app.kubernetes.io/name']
        pattern ^ingress-nginx$
        tag     "process.app_nginx_ingress"
      </rule>
      <rule>
        key     $.kubernetes.labels.name
        pattern ^ingress-nginx$
        tag     "process.app_nginx_ingress"
      </rule>
      <rule>
        key     $.kubernetes.labels.app
        pattern ^ingress-traefik$
        tag     "process.app_traefik_ingress"
      </rule>
      <rule>
        key     $['kubernetes']['labels']['app.kubernetes.io/name']
        pattern ^(traefik|ingress-traefik)$
        tag     "process.app_traefik_ingress"
      </rule>
      <rule>
        key     $.kubernetes.labels.name
        pattern ^ingress-traefik$
        tag     "process.app_traefik_ingress"
      </rule>
      # Last rule: catchall
      <rule>
        invert  true
        key     $.kubernetes.labels.app
        pattern ^nginx-ingress$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.container"
      </rule>
    </match>
    # check namespace_name. if it is okay too, tag as router log.
    # if namespace didn't match, set tag to container log.
    <match process.app_nginx_ingress>
      @type rewrite_tag_filter
      <rule>
        key     $.kubernetes.namespace_name
        pattern ^syn-nginx-ingress$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.router.nginx"
      </rule>
      <rule>
        key     $.kubernetes.namespace_name
        pattern ^ingress-nginx$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.router.nginx"
      </rule>
      <rule>
        key     $.kubernetes.namespace_name
        pattern ^sigsci-ingress-nginx$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.router.nginx"
      </rule>
      # Last rule: catchall
      <rule>
        invert  true
        key     $.kubernetes.namespace_name
        pattern ^syn-nginx-ingress$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.container"
      </rule>
    </match>
    # check namespace_name for Traefik too.
    # Traefik ingress controller namespace is explicitly ingress-traefik.
    <match process.app_traefik_ingress>
      @type rewrite_tag_filter
      <rule>
        key     $.kubernetes.namespace_name
        pattern ^ingress-traefik$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.router.traefik"
      </rule>
      # Last rule: catchall
      <rule>
        invert  true
        key     $.kubernetes.namespace_name
        pattern ^ingress-traefik$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.container"
      </rule>
    </match>

    #
    # process container logs
    #
    # restructure so the kubernetes_metadata plugin can find the keys it needs
    <filter lagoon.*.container>
      @type record_modifier
      remove_keys _dummy_
      <record>
        _dummy_ ${record['docker'] = {'container_id' => "#{record.dig('kubernetes','docker_id')}"}; nil}
      </record>
    </filter>
    # enrich with k8s metadata (will get the namespace labels)
    <filter lagoon.*.container>
      @type kubernetes_metadata
      @log_level warn
      skip_container_metadata true
      skip_master_url         true
    </filter>
    # strip the duplicate information so that it doesn't appear in logs
    <filter lagoon.*.container>
      @type record_modifier
      remove_keys docker
    </filter>
    # post-process to try to eke some more structure out of the logs.
    # the last "format none" block is a catch-all for unmatched messages.
    <filter lagoon.*.container>
      @type parser
      key_name message
      reserve_data true
      <parse>
        @type multi_format
        <pattern>
          format regexp
          expression /^(?<remote>[^ ]*) (?<host>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)"(?:\s+"(?<forwarded_for>[^"]+)")?)?$/
          time_format %d/%b/%Y:%H:%M:%S %z
          types  size:integer
        </pattern>
        <pattern>
          format none
        </pattern>
      </parse>
    </filter>

    #
    # process nginx_router logs
    #
    # The message field may be json-encoded router logs, so parse that and put the
    # keys in the top-level log object.
    <filter lagoon.*.router.nginx>
      @type parser
      key_name message
      reserve_time true
      reserve_data true
      remove_key_name_field true
      <parse>
        @type multi_format
        <pattern>
          format json
        </pattern>
        <pattern>
          format none
        </pattern>
      </parse>
    </filter>
    # Traefik access logs are also JSON, but the field names differ from the
    # ingress-nginx JSON format. Map a few common fields back to the nginx-style
    # names here so downstream consumers can keep using the same schema.
    <filter lagoon.*.router.traefik>
      @type parser
      key_name message
      reserve_time true
      reserve_data true
      remove_key_name_field true
      <parse>
        @type multi_format
        <pattern>
          format json
        </pattern>
        <pattern>
          format none
        </pattern>
      </parse>
    </filter>
    <filter lagoon.*.router.traefik>
      @type record_modifier
      remove_keys _dummy_
      <record>
        _dummy_ ${router_name = record['RouterName']&.sub(/@.*/, ''); raw_service_name = record['ServiceName']&.sub(/@.*/, ''); service_name = raw_service_name; service_host = (record['ServiceURL'] || record['ServiceAddr'])&.sub(/^[a-z]+:\/\//, '')&.sub(/\/.*$/, '')&.sub(/:.*/, ''); service_scheme = record['ServiceURL']&.match(/\A([a-z0-9+.-]+):\/\//i)&.captures&.first; service_addr_port = record['ServiceAddr']&.match(/:(\d+)\z/)&.captures&.first; svc_match = service_host&.match(/^([^.]+)\.([^.]+)\.svc(?:\.|$)/); service_namespace = svc_match&.captures&.last; service_bare = svc_match&.captures&.first; raw_service_base = raw_service_name&.sub(/-(?:tcp|udp|sctp)-\d+\z/, ''); raw_service_port_name = if raw_service_base && service_scheme && raw_service_base.end_with?('-' + service_scheme) && raw_service_base.delete_suffix('-' + service_scheme).include?('-') then service_scheme elsif raw_service_base&.match(/-(?:http|https)\z/i) && raw_service_base.sub(/-(?:http|https)\z/i, '').include?('-') then raw_service_base[/[^-]+\z/]&.downcase end; raw_service_base_without_port = raw_service_port_name ? raw_service_base.sub(/-#{Regexp.escape(raw_service_port_name)}\z/i, '') : raw_service_base; service_name_from_router = if service_bare.nil? && raw_service_name&.match(/-(?:tcp|udp|sctp)-\d+\z/) && router_name && raw_service_base == router_name then router_name[/[^-]+\z/] end; service_name_from_raw = if service_bare.nil? && service_name_from_router.nil? && raw_service_base_without_port&.include?('-') then raw_service_base_without_port[/[^-]+\z/] end; service_name = service_bare || service_name_from_router || service_name_from_raw || raw_service_name; router_namespace = if router_name && raw_service_port_name && service_name && router_name.end_with?("-#{service_name}-#{raw_service_port_name}") then router_name.delete_suffix("-#{service_name}-#{raw_service_port_name}") elsif router_name && service_name && router_name.end_with?('-' + service_name) then router_name.delete_suffix('-' + service_name) end; service_namespace_from_name = if raw_service_base_without_port && service_name && raw_service_base_without_port.end_with?('-' + service_name) then raw_service_base_without_port.delete_suffix('-' + service_name) end; headers = record['RequestHeaders'] || {}; request_host = record['RequestHost']&.sub(/:\d+$/, ''); request_path = record['RequestPath'] || record['request_uri']; request_query = record['RequestQuery']; request_path, request_query = request_path.split('?', 2) if request_query.nil? && request_path&.include?('?'); request_x_forwarded_for = record['request_X-Forwarded-For'] || record['request_x-forwarded-for'] || headers['X-Forwarded-For'] || headers['x-forwarded-for']; request_true_client_ip = record['request_True-Client-Ip'] || record['request_True-Client-IP'] || record['request_true-client-ip'] || headers['True-Client-IP'] || headers['true-client-ip']; request_req_id = record['request_X-Request-Id'] || record['request_X-Request-ID'] || record['request_x-request-id'] || headers['X-Request-Id'] || headers['X-Request-ID'] || headers['x-request-id']; request_user_agent = record['request_User-Agent'] || record['request_user-agent'] || headers['User-Agent'] || headers['user-agent'] || record['RequestUserAgent']; request_referer = record['request_Referer'] || headers['Referer'] || headers['referer'] || record['RequestReferer']; request_content_length = record['request_Content-Length'] || record['request_Content-length'] || record['request_content-length'] || headers['Content-Length'] || headers['content-length']; request_content_length = request_content_length&.to_s&.split(',')&.first&.strip; request_length_from_field = record['RequestLength']; request_length_from_field = nil if request_length_from_field.respond_to?(:to_i) && request_length_from_field.to_i == 0; request_content_size = record['RequestContentSize']; request_content_size = nil if request_content_size.respond_to?(:to_i) && request_content_size.to_i == 0; request_body_length = request_length_from_field || request_content_size || (request_content_length&.match(/\A\d+\z/) ? request_content_length.to_i : nil); x_forwarded_for = record['x-forwarded-for'] || request_x_forwarded_for || record['X-Forwarded-For'] || record['x-forwarded-for']; fastly_client_ip = headers['Fastly-Client-IP'] || headers['fastly-client-ip'] || record['Fastly-Client-IP'] || record['fastly-client-ip']; true_client_ip = record['true-client-ip'] || request_true_client_ip || headers['True-Client-IP'] || headers['true-client-ip'] || record['True-Client-IP'] || record['true-client-ip'] || fastly_client_ip; x_forwarded_proto = headers['X-Forwarded-Proto'] || headers['x-forwarded-proto'] || record['X-Forwarded-Proto'] || record['x-forwarded-proto']; req_id = request_req_id || record['RequestID'] || record['request_id'] || record['RequestCount']&.to_s; existing_req_id = record['req_id']; existing_req_id = nil if existing_req_id.to_s.empty? || existing_req_id == '-'; existing_request_length = record['request_length']; existing_request_length = nil if existing_request_length.respond_to?(:to_i) && existing_request_length.to_i == 0; existing_http_user_agent = record['http_user_agent']; existing_http_user_agent = nil if existing_http_user_agent.to_s.empty? || existing_http_user_agent == '-'; existing_remote_user = record['remote_user']; existing_remote_user = nil if existing_remote_user.to_s.empty? || existing_remote_user == '-'; client_ip = true_client_ip || fastly_client_ip || record['ClientHost']; record['time'] = record['time'] || record['StartUTC']; record['remote_addr'] = record['remote_addr'] || client_ip; record['x-forwarded-for'] = x_forwarded_for || '-'; record['true-client-ip'] = true_client_ip || '-'; record['req_id'] = existing_req_id || req_id || '-'; record['remote_user'] = existing_remote_user || record['RequestUser'] || record['ClientUsername'] || '-'; record['bytes_sent'] = record['bytes_sent'] || record['DownstreamContentSize']; record['request_time'] = record['request_time'] || (record['Duration'] ? (record['Duration'].to_f / 1_000_000_000).round(6) : nil); record['status'] = record['status'] || record['DownstreamStatus']&.to_s; record['host'] = record['host'] || request_host; record['request_proto'] = record['request_proto'] || record['RequestProtocol']; record['request_uri'] = record['request_uri'] || request_path; record['request_query'] = record['request_query'] || request_query || '-'; record['request_length'] = existing_request_length || request_body_length || 0; record['request_method'] = record['request_method'] || record['RequestMethod']; record['request_scheme'] = record['request_scheme'] || record['RequestScheme'] || x_forwarded_proto&.split(',')&.first&.strip || '-'; record['http_referer'] = record['http_referer'] || request_referer || '-'; record['http_user_agent'] = existing_http_user_agent || request_user_agent || '-'; ns = record['namespace'] || service_namespace || service_namespace_from_name || router_namespace; service_name = service_name.delete_prefix(ns + '-').sub(/-(?:tcp|udp|sctp)-\d+\z/, '') if ns && service_name&.start_with?(ns + '-'); record['namespace'] = ns; record['ingress_name'] = record['ingress_name'] || record['host'] || request_host || router_name; record['ingress_controller'] = record['ingress_controller'] || 'ingress-traefik'; record['service_name'] = record['service_name'] || service_name; record['service_port'] = record['service_port'] || raw_service_port_name || service_scheme || service_addr_port || record['ServiceAddr'] || record['ServiceURL']; nil}
      </record>
    </filter>
    <filter lagoon.*.router.traefik>
      @type record_modifier
      remove_keys _dummy_,StartUTC,StartLocal,ClientHost,ClientAddr,ClientPort,RequestHost,RequestAddr,RequestPort,RequestScheme,RequestMethod,RequestPath,RequestQuery,RequestProtocol,RequestUserAgent,RequestReferer,RequestID,RequestUser,RequestCount,ClientUsername,RequestLength,RequestContentSize,RequestHeaders,X-Forwarded-For,X-Forwarded-Proto,x-forwarded-proto,True-Client-IP,Fastly-Client-IP,fastly-client-ip,DownstreamStatus,DownstreamContentSize,OriginContentSize,OriginDuration,OriginStatus,Duration,Overhead,RetryAttempts,RouterName,ServiceName,ServiceAddr,ServiceURL,TLSCipher,TLSVersion,entryPointName,request_User-Agent,request_user-agent,request_Referer,request_Content-Length,request_Content-length,request_content-length,request_X-Real-Ip,request_X-Forwarded-For,request_x-forwarded-for,request_True-Client-Ip,request_True-Client-IP,request_true-client-ip,request_X-Request-Id,request_X-Request-ID,request_x-request-id,level,msg
    </filter>
    # match the Traefik router logs here and relabel them based on whether they
    # were successfully mapped to the nginx-style schema above or not.
    <match lagoon.*.router.traefik>
      @type rewrite_tag_filter
      <rule>
        # if the host key doesn't exist then this was not parsed as an access
        # log, so this is a controller log. These are noisy, so discard by
        # default unless explicitly enabled.
        invert true
        key host
        pattern /.+/
        tag ${tag}
        label @DISCARD
      </rule>
      <rule>
        # host key exists, so this is a HTTP request log.
        key host
        pattern /.+/
        tag "lagoon.#{ENV['CLUSTER_NAME']}.router.traefik"
        label @ROUTER_OUTPUT
      </rule>
    </match>
    # match the nginx router logs here and relabel them based on whether they
    # were successfully parsed as json above or not
    <match lagoon.*.router.nginx>
      @type rewrite_tag_filter
      <rule>
        # if the host key doesn't exist then this was not parsed as JSON, so we
        # just send to @OUTPUT directly because it is an actual nginx
        # controller log. These logs will appear in index_name
        # router-logs-ingress-nginx_.* if the keepIngressNginxController value
        # is set to true.
        invert true
        key host
        pattern /.+/
        tag ${tag}
        label @DISCARD
      </rule>
      <rule>
        # host key exists, so this is a HTTP request log
        key host
        pattern /.+/
        tag ${tag}
        label @ROUTER_OUTPUT
      </rule>
    </match>
    <label @ROUTER_OUTPUT>
      # Strip ingress namespace info and add enough dummy information
      # so that kubernetes_metadata plugin can get the namespace labels.
      <filter lagoon.*.router.**>
        @type record_modifier
        remove_keys _dummy_
        <record>
          _dummy_ ${record['kubernetes'] = {'namespace_name' => record['namespace'], 'pod_name' => 'nopod', 'container_name' => 'nocontainer'}; record['docker'] = {'container_id' => "#{record['namespace']}_#{record['ingress_name']}"}; nil}
        </record>
      </filter>
      # enrich with k8s metadata (will get the namespace labels)
      <filter lagoon.*.router.**>
        @type kubernetes_metadata
        @log_level warn
        skip_container_metadata true
        skip_master_url         true
      </filter>
      # strip the dummy information so that it doesn't appear in logs
      <filter lagoon.*.router.**>
        @type record_modifier
        remove_keys _dummy_,docker
        <record>
          _dummy_ ${record['kubernetes'].delete('pod_name'); record['kubernetes'].delete('container_name'); record['kubernetes'].delete('pod_id'); nil}
        </record>
      </filter>
      <match lagoon.*.router.**>
        @type relabel
        @label @OUTPUT
      </match>
    </label>

    <match lagoon.**>
      @type relabel
      @label @OUTPUT
    </match>

    <label @OUTPUT>
      #
      # add cluster identifier
      #
      <filter lagoon.**>
        @type record_modifier
        <record>
          cluster "#{ENV['CLUSTER_NAME']}"
        </record>
      </filter>
      #
      # add the container logs index_name
      #
      <filter lagoon.*.container>
        @type record_modifier
        <record>
          index_name container-logs-${record.dig('kubernetes','namespace_labels','lagoon.sh/project')&.gsub("_", "-") || "#{record.dig('kubernetes','namespace_name') || 'unknown_project'}_#{ENV['CLUSTER_NAME']}"}-_-${record.dig('kubernetes','namespace_labels','lagoon.sh/environmentType') || "unknown_environmenttype"}-_-${Time.at(time).strftime("%Y.%m")}
          log ${record['log'] || ""}
        </record>
      </filter>
      #
      # add the router logs index_name
      #
      <filter lagoon.*.router.**>
        @type record_modifier
        <record>
          index_name router-logs-${record.dig('kubernetes','namespace_labels','lagoon.sh/project')&.gsub("_", "-") || "#{record.dig('kubernetes','namespace_name') || 'unknown_project'}_#{ENV['CLUSTER_NAME']}"}-_-${record.dig('kubernetes','namespace_labels','lagoon.sh/environmentType') || "unknown_environmenttype"}-_-${Time.at(time).strftime("%Y.%m")}
        </record>
      </filter>
      #
      # add the lagoon logs index_name
      # the source for this tag is included when lagoonLogs.enabled is true
      #
      <filter lagoon.*.lagoon>
        @type record_modifier
        <record>
          index_name lagoon-logs-${record['project']}-_-all_environments-_-${Time.at(time).strftime("%Y.%m")}
        </record>
      </filter>
      #
      # exclude the lagoon logs for running builds, and legacy task: updates
      #
      <filter lagoon.*.lagoon>
        @type grep
        <or>
          <exclude>
            key $.meta.buildPhase
            pattern ^running$
          </exclude>
          <exclude>
            key $.meta.buildStatus
            pattern ^running$
          </exclude>
          <exclude>
            key $.event
            pattern ^task:builddeploy-kubernetes:*
          </exclude>
        </or>
      </filter>
      #
      # dump all logs to stdout
      #
      <match lagoon.**>
        @type file
        path /tmp/log.out
        <format>
          @type json
        </format>
        <buffer time>
          timekey 1s
          timekey_use_utc true
          timekey_wait 1s
          flush_mode interval
          flush_interval 1s
        </buffer>
      </match>
    </label>

    <label @DISCARD>
      <match lagoon.**>
        @type null
      </match>
    </label>
  input.log: |
