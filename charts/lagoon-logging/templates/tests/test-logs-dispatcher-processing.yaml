{{- if .Values.testFixtures.create }}
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    lagoon.sh/environment: dev
    lagoon.sh/environmentType: development
    lagoon.sh/project: test-logs-deleteme-fakeproject
  name: test-logs-deleteme-fakeproject-dev
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    lagoon.sh/environment: prod
    lagoon.sh/environmentType: production
    lagoon.sh/project: test-logs-deleteme-fakeproject
  name: test-logs-deleteme-fakeproject-prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lagoon-logging.logsDispatcher.fullname" . }}-test-processing-fluent-conf
  labels:
    {{- include "lagoon-logging.logsDispatcher.labels" . | nindent 4 }}
data:
  fluent.conf: |
    <system>
      workers 1
      # comment out this line to see warnings
      # it is set to error because fluentd is quite chatty
      log_level error
    </system>
    # container logs collected by the logging-operator
    <source>
      @type  forward
      @id    in_container
      tag    process.container
    </source>

    #
    # pre-processing for ingress controller logs
    #
    # the reason for having the two match blocks is because we have two checks
    # to distinguish ingress controller logs:
    # * controller pod labels identify the ingress implementation
    # * namespace identifies the controller installation
    # if either of those checks fails the message is tagged as a regular
    # container log.
    #
    # check app name first. if app name didn't match, set tag to container log.
    <match process.container>
      @type rewrite_tag_filter
      <rule>
        key     $.kubernetes.labels.app
        pattern ^nginx-ingress$
        tag     "process.app_nginx_ingress"
      </rule>
      <rule>
        key     $['kubernetes']['labels']['app.kubernetes.io/name']
        pattern ^ingress-nginx$
        tag     "process.app_nginx_ingress"
      </rule>
      <rule>
        key     $.kubernetes.labels.name
        pattern ^ingress-nginx$
        tag     "process.app_nginx_ingress"
      </rule>
      <rule>
        key     $.kubernetes.labels.app
        pattern ^ingress-traefik$
        tag     "process.app_traefik_ingress"
      </rule>
      <rule>
        key     $['kubernetes']['labels']['app.kubernetes.io/name']
        pattern ^(traefik|ingress-traefik)$
        tag     "process.app_traefik_ingress"
      </rule>
      <rule>
        key     $.kubernetes.labels.name
        pattern ^ingress-traefik$
        tag     "process.app_traefik_ingress"
      </rule>
      # Last rule: catchall
      <rule>
        invert  true
        key     $.kubernetes.labels.app
        pattern ^nginx-ingress$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.container"
      </rule>
    </match>
    # check namespace_name. if it is okay too, tag as router log.
    # if namespace didn't match, set tag to container log.
    <match process.app_nginx_ingress>
      @type rewrite_tag_filter
      <rule>
        key     $.kubernetes.namespace_name
        pattern ^syn-nginx-ingress$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.router.nginx"
      </rule>
      <rule>
        key     $.kubernetes.namespace_name
        pattern ^ingress-nginx$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.router.nginx"
      </rule>
      <rule>
        key     $.kubernetes.namespace_name
        pattern ^sigsci-ingress-nginx$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.router.nginx"
      </rule>
      # Last rule: catchall
      <rule>
        invert  true
        key     $.kubernetes.namespace_name
        pattern ^syn-nginx-ingress$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.container"
      </rule>
    </match>
    # check namespace_name for Traefik too.
    # Traefik ingress controller namespace is explicitly ingress-traefik.
    <match process.app_traefik_ingress>
      @type rewrite_tag_filter
      <rule>
        key     $.kubernetes.namespace_name
        pattern ^ingress-traefik$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.router.traefik"
      </rule>
      # Last rule: catchall
      <rule>
        invert  true
        key     $.kubernetes.namespace_name
        pattern ^ingress-traefik$
        tag     "lagoon.#{ENV['CLUSTER_NAME']}.container"
      </rule>
    </match>

    #
    # process container logs
    #
    # restructure so the kubernetes_metadata plugin can find the keys it needs
    <filter lagoon.*.container>
      @type record_modifier
      remove_keys _dummy_
      <record>
        _dummy_ ${record['docker'] = {'container_id' => "#{record.dig('kubernetes','docker_id')}"}; nil}
      </record>
    </filter>
    # enrich with k8s metadata (will get the namespace labels)
    <filter lagoon.*.container>
      @type kubernetes_metadata
      @log_level warn
      skip_container_metadata true
      skip_master_url         true
    </filter>
    # strip the duplicate information so that it doesn't appear in logs
    <filter lagoon.*.container>
      @type record_modifier
      remove_keys docker
    </filter>
    # post-process to try to eke some more structure out of the logs.
    # the last "format none" block is a catch-all for unmatched messages.
    <filter lagoon.*.container>
      @type parser
      key_name message
      reserve_data true
      <parse>
        @type multi_format
        <pattern>
          format regexp
          expression /^(?<remote>[^ ]*) (?<host>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)"(?:\s+"(?<forwarded_for>[^"]+)")?)?$/
          time_format %d/%b/%Y:%H:%M:%S %z
          types  size:integer
        </pattern>
        <pattern>
          format none
        </pattern>
      </parse>
    </filter>

    #
    # process nginx_router logs
    #
    # The message field may be json-encoded router logs, so parse that and put the
    # keys in the top-level log object.
    <filter lagoon.*.router.nginx>
      @type parser
      key_name message
      reserve_time true
      reserve_data true
      remove_key_name_field true
      <parse>
        @type multi_format
        <pattern>
          format json
        </pattern>
        <pattern>
          format none
        </pattern>
      </parse>
    </filter>
    # Traefik access logs are also JSON, but the field names differ from the
    # ingress-nginx JSON format. Map a few common fields back to the nginx-style
    # names here so downstream consumers can keep using the same schema.
    <filter lagoon.*.router.traefik>
      @type parser
      key_name message
      reserve_time true
      reserve_data true
      remove_key_name_field true
      <parse>
        @type multi_format
        <pattern>
          format json
        </pattern>
        <pattern>
          format none
        </pattern>
      </parse>
    </filter>
    <filter lagoon.*.router.traefik>
      @type record_modifier
      remove_keys _dummy_
      <record>
        _dummy_ ${router_name = record['RouterName']&.sub(/@.*/, ''); service_name = record['ServiceName']&.sub(/@.*/, ''); service_host = (record['ServiceURL'] || record['ServiceAddr'])&.sub(%r{^[a-z]+://}, '')&.sub(%r{/.*$}, '')&.sub(/:.*/, ''); service_namespace = service_host&.match(/^[^.]+\.([^.]+)\.svc(?:\.|$)/)&.captures&.first; router_namespace = if router_name && service_name && router_name.end_with?("-#{service_name}"); router_name.sub(/-#{Regexp.escape(service_name)}\z/, ''); end; headers = record['RequestHeaders'] || {}; request_path = record['RequestPath'] || record['request_uri']; request_query = record['RequestQuery']; if request_query.nil? && request_path&.include?('?'); request_path, request_query = request_path.split('?', 2); end; x_forwarded_for = headers['X-Forwarded-For'] || headers['x-forwarded-for'] || record['X-Forwarded-For'] || record['x-forwarded-for']; true_client_ip = headers['True-Client-IP'] || headers['true-client-ip'] || record['True-Client-IP'] || record['true-client-ip']; req_id = record['RequestID'] || headers['X-Request-Id'] || headers['X-Request-ID'] || headers['x-request-id']; record['time'] = record['time'] || record['StartUTC']; record['host'] = record['host'] || record['RequestHost']&.sub(/:\d+$/, ''); record['remote_addr'] = record['remote_addr'] || record['ClientHost']; record['request_method'] = record['request_method'] || record['RequestMethod']; record['request_uri'] = record['request_uri'] || request_path; record['request_query'] = record['request_query'] || request_query || '-'; record['request_proto'] = record['request_proto'] || record['RequestProtocol']; record['status'] = record['status'] || record['DownstreamStatus']&.to_s; record['bytes_sent'] = record['bytes_sent'] || record['DownstreamContentSize']; record['request_time'] = record['request_time'] || (record['Duration'] ? (record['Duration'].to_f / 1_000_000_000).round(6) : nil); record['http_user_agent'] = record['http_user_agent'] || record['RequestUserAgent'] || headers['User-Agent'] || headers['user-agent'] || '-'; record['http_referer'] = record['http_referer'] || record['RequestReferer'] || headers['Referer'] || headers['referer'] || '-'; record['x-forwarded-for'] = record['x-forwarded-for'] || x_forwarded_for || '-'; record['true-client-ip'] = record['true-client-ip'] || true_client_ip || '-'; record['req_id'] = record['req_id'] || req_id || '-'; record['remote_user'] = record['remote_user'] || record['RequestUser'] || record['ClientUsername'] || '-'; record['request_length'] = record['request_length'] || record['RequestContentSize'] || record['RequestLength'] || 0; sn_clean = record['ServiceName']&.sub(/@.*/, ''); sn_stripped = sn_clean&.sub(/-[^-]+-[^-]+$/, ''); extracted_ns = (sn_stripped != sn_clean) ? sn_stripped : nil; record['namespace'] = record['namespace'] || service_namespace || extracted_ns || router_namespace; record['ingress_name'] = record['ingress_name'] || record['RequestHost'] || router_name; record['service_name'] = record['service_name'] || service_name; record['service_port'] = record['service_port'] || record['ServiceAddr'] || record['ServiceURL']; nil}
      </record>
    </filter>
    <filter lagoon.*.router.traefik>
      @type record_modifier
      remove_keys _dummy_,StartUTC,StartLocal,ClientHost,ClientAddr,ClientPort,RequestHost,RequestAddr,RequestPort,RequestScheme,RequestMethod,RequestPath,RequestQuery,RequestProtocol,RequestUserAgent,RequestReferer,RequestID,RequestUser,RequestCount,ClientUsername,RequestLength,RequestContentSize,RequestHeaders,X-Forwarded-For,x-forwarded-for,True-Client-IP,true-client-ip,DownstreamStatus,DownstreamContentSize,OriginContentSize,OriginDuration,OriginStatus,Duration,Overhead,RetryAttempts,RouterName,ServiceName,ServiceAddr,ServiceURL,TLSCipher,TLSVersion,entryPointName
    </filter>
    # match the Traefik router logs here and relabel them based on whether they
    # were successfully mapped to the nginx-style schema above or not.
    <match lagoon.*.router.traefik>
      @type rewrite_tag_filter
      <rule>
        # if the host key doesn't exist then this was not parsed as an access
        # log, so this is a controller log. These are noisy, so discard by
        # default unless explicitly enabled.
        invert true
        key host
        pattern /.+/
        tag ${tag}
        label @DISCARD
      </rule>
      <rule>
        # host key exists, so this is a HTTP request log.
        key host
        pattern /.+/
        tag "lagoon.#{ENV['CLUSTER_NAME']}.router.traefik"
        label @ROUTER_OUTPUT
      </rule>
    </match>
    # match the nginx router logs here and relabel them based on whether they
    # were successfully parsed as json above or not
    <match lagoon.*.router.nginx>
      @type rewrite_tag_filter
      <rule>
        # if the host key doesn't exist then this was not parsed as JSON, so we
        # just send to @OUTPUT directly because it is an actual nginx
        # controller log. These logs will appear in index_name
        # router-logs-ingress-nginx_.* if the keepIngressNginxController value
        # is set to true.
        invert true
        key host
        pattern /.+/
        tag ${tag}
        label @DISCARD
      </rule>
      <rule>
        # host key exists, so this is a HTTP request log
        key host
        pattern /.+/
        tag ${tag}
        label @ROUTER_OUTPUT
      </rule>
    </match>
    <label @ROUTER_OUTPUT>
      # Strip ingress namespace info and add enough dummy information
      # so that kubernetes_metadata plugin can get the namespace labels.
      <filter lagoon.*.router.**>
        @type record_modifier
        remove_keys _dummy_
        <record>
          _dummy_ ${record['kubernetes'] = {'namespace_name' => record['namespace'], 'pod_name' => 'nopod', 'container_name' => 'nocontainer'}; record['docker'] = {'container_id' => "#{record['namespace']}_#{record['ingress_name']}"}; nil}
        </record>
      </filter>
      # enrich with k8s metadata (will get the namespace labels)
      <filter lagoon.*.router.**>
        @type kubernetes_metadata
        @log_level warn
        skip_container_metadata true
        skip_master_url         true
      </filter>
      # strip the dummy information so that it doesn't appear in logs
      <filter lagoon.*.router.**>
        @type record_modifier
        remove_keys _dummy_,docker
        <record>
          _dummy_ ${record['kubernetes'].delete('pod_name'); record['kubernetes'].delete('container_name'); record['kubernetes'].delete('pod_id'); nil}
        </record>
      </filter>
      <match lagoon.*.router.**>
        @type relabel
        @label @OUTPUT
      </match>
    </label>

    <match lagoon.**>
      @type relabel
      @label @OUTPUT
    </match>

    <label @OUTPUT>
      #
      # add cluster identifier
      #
      <filter lagoon.**>
        @type record_modifier
        <record>
          cluster "#{ENV['CLUSTER_NAME']}"
        </record>
      </filter>
      #
      # add the container logs index_name
      #
      <filter lagoon.*.container>
        @type record_modifier
        <record>
          index_name container-logs-${record.dig('kubernetes','namespace_labels','lagoon.sh/project')&.gsub("_", "-") || "#{record.dig('kubernetes','namespace_name') || 'unknown_project'}_#{ENV['CLUSTER_NAME']}"}-_-${record.dig('kubernetes','namespace_labels','lagoon.sh/environmentType') || "unknown_environmenttype"}-_-${Time.at(time).strftime("%Y.%m")}
          log ${record['log'] || ""}
        </record>
      </filter>
      #
      # add the router logs index_name
      #
      <filter lagoon.*.router.**>
        @type record_modifier
        <record>
          index_name router-logs-${record.dig('kubernetes','namespace_labels','lagoon.sh/project')&.gsub("_", "-") || "#{record.dig('kubernetes','namespace_name') || 'unknown_project'}_#{ENV['CLUSTER_NAME']}"}-_-${record.dig('kubernetes','namespace_labels','lagoon.sh/environmentType') || "unknown_environmenttype"}-_-${Time.at(time).strftime("%Y.%m")}
        </record>
      </filter>
      #
      # add the lagoon logs index_name
      # the source for this tag is included when lagoonLogs.enabled is true
      #
      <filter lagoon.*.lagoon>
        @type record_modifier
        <record>
          index_name lagoon-logs-${record['project']}-_-all_environments-_-${Time.at(time).strftime("%Y.%m")}
        </record>
      </filter>
      #
      # exclude the lagoon logs for running builds, and legacy task: updates
      #
      <filter lagoon.*.lagoon>
        @type grep
        <or>
          <exclude>
            key $.meta.buildPhase
            pattern ^running$
          </exclude>
          <exclude>
            key $.meta.buildStatus
            pattern ^running$
          </exclude>
          <exclude>
            key $.event
            pattern ^task:builddeploy-kubernetes:*
          </exclude>
        </or>
      </filter>
      #
      # dump all logs to stdout
      #
      <match lagoon.**>
        @type file
        path /tmp/log.out
        <format>
          @type json
        </format>
        <buffer time>
          timekey 1s
          timekey_use_utc true
          timekey_wait 1s
          flush_mode interval
          flush_interval 1s
        </buffer>
      </match>
    </label>

    <label @DISCARD>
      <match lagoon.**>
        @type null
      </match>
    </label>
  input.log: |
    {{- /* nginx router logs */}}
