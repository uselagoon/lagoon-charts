apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lagoon-logging.logsDispatcher.fullname" . }}-env
  labels:
    {{- include "lagoon-logging.logsDispatcher.labels" . | nindent 4 }}
data:
  CLUSTER_NAME: "{{ .Values.clusterName }}"
{{- if .Values.enableDefaultForwarding }}
  LOGS_FORWARD_HOST: "{{ .Values.forward.host }}" 
  LOGS_FORWARD_HOSTNAME: "{{ .Values.forward.host }}" 
  LOGS_FORWARD_HOST_PORT: "{{ .Values.forward.hostPort }}" 
{{- end }}
{{- if .Values.lagoonLogs.enabled }}
  RABBITMQ_HOST: "{{ .Values.lagoonLogs.rabbitMQHost }}"
{{- end }}
